name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug / release)'
        required: false
        default: 'debug'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Setup Java (JDK 17) ───────────────────────────────
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Setup Android SDK ─────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm dependencies ──────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── 6. Build frontend assets (Vite) ──────────────────────
      - name: Build frontend assets
        run: npm run build

      # ── 7. Sync Capacitor ke Android ─────────────────────────
      - name: Capacitor sync Android
        run: npx cap sync android

      # ── 8. Fix local.properties untuk CI ─────────────────────
      - name: Set Android SDK path
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # ── 9. Grant execute permission untuk gradlew ─────────────
      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      # ── 10. Build Debug APK ───────────────────────────────────
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        run: ./gradlew assembleDebug --no-daemon
        working-directory: android

      # ── 11. Build Release APK (unsigned) ─────────────────────
      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: ./gradlew assembleRelease --no-daemon
        working-directory: android

      # ── 12. Upload APK sebagai artifact ──────────────────────
      - name: Upload Debug APK
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: rigel-coins-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: rigel-coins-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      # ── 13. Summary ───────────────────────────────────────────
      - name: Build Summary
        run: |
          echo "## ✅ Build Selesai" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Info | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build # | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | \`${{ github.event.inputs.build_type || 'debug' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK tersedia di tab **Artifacts** di atas." >> $GITHUB_STEP_SUMMARY
